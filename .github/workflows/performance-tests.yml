name: Performance Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      test_profile:
        description: 'Test profile to run (smoke | load | stress)'
        required: false
        default: 'smoke'

jobs:
  k6-tests:
    name: k6 Load Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run k6 hello-world (smoke)
        # v0.3.1 is the latest stable release of the official Grafana k6 action
        uses: grafana/k6-action@v0.3.1
        with:
          filename: k6-tests/hello-world.js
          flags: --vus 1 --duration 30s

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: results/

  taurus-tests:
    name: Taurus Tests
    runs-on: ubuntu-latest
    needs: k6-tests
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Taurus (bzt)
        run: pip install bzt

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Taurus hello-world test
        run: bzt taurus-tests/hello-world.yml
        env:
          TARGET_URL: "https://demoblaze.com"

      - name: Upload Taurus results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: taurus-results
          path: reports/

  blazemeter-tests:
    name: BlazeMeter Cloud Tests
    runs-on: ubuntu-latest
    # Only run if BLAZEMETER_API_TOKEN secret is available
    if: ${{ vars.BLAZEMETER_ENABLED == 'true' }}
    needs: taurus-tests
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Taurus (bzt)
        run: pip install bzt

      - name: Run tests on BlazeMeter cloud
        run: |
          bzt taurus-tests/hello-world.yml \
            -o modules.blazemeter.token=${BLAZEMETER_API_TOKEN} \
            -o modules.blazemeter.project-id=${BLAZEMETER_PROJECT_ID}
        env:
          BLAZEMETER_API_TOKEN: ${{ secrets.BLAZEMETER_API_TOKEN }}
          BLAZEMETER_PROJECT_ID: ${{ vars.BLAZEMETER_PROJECT_ID }}
